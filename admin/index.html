<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Life 后台管理</title>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
  <!-- 登录页 -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <h2>AI Life 后台管理</h2>
      <input type="email" id="login-email" placeholder="邮箱" class="login-input" value="wendong0809@qq.com">
      <input type="password" id="login-password" placeholder="密码" class="login-input" value="amman123">
      <button class="login-btn" onclick="doLogin()">登录</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- 管理界面 -->
  <div id="admin-layout" class="layout" style="display:none">
    <nav class="sidebar">
      <div class="logo">AI Life Admin</div>
      <ul class="nav-list">
        <li class="nav-item active" data-page="dashboard">仪表盘</li>
        <li class="nav-item" data-page="messages">消息管理</li>
        <li class="nav-item" data-page="facts">事实管理</li>
        <li class="nav-item" data-page="logs">操作日志</li>
        <li class="nav-item" data-page="ai-logs">AI调用日志</li>
        <li class="nav-item" data-page="check">数据检查</li>
        <li class="nav-item" data-page="users">用户管理</li>
      </ul>
      <div class="sidebar-footer">
        <div id="user-info" class="user-info"></div>
        <a href="http://127.0.0.1:8080" target="_blank" class="link-app">打开移动端应用</a>
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>
    </nav>

    <main class="content">
      <header class="topbar">
        <h1 id="page-title">仪表盘</h1>
        <button class="btn btn-sm" onclick="refresh()">刷新</button>
      </header>
      <div id="page-content" class="page-content"></div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">详情</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="/admin/app.js"></script>
</body>
</html>

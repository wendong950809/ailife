/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  
  /* solo-design consumption aliases: explicit prefix for fill-html-head.mjs */
  --apple-background: var(--background, #ffffff);
  --apple-foreground: var(--foreground, #0f172a);
  --apple-card: var(--card, var(--background));
  --apple-card-foreground: var(--card-foreground, var(--foreground));
  --apple-popover: var(--popover, var(--card));
  --apple-popover-foreground: var(--popover-foreground, var(--card-foreground, var(--foreground)));
  --apple-primary: var(--primary, #111827);
  --apple-primary-foreground: var(--primary-foreground, #ffffff);
  --apple-secondary: var(--secondary, var(--muted, var(--card)));
  --apple-secondary-foreground: var(--secondary-foreground, var(--foreground));
  --apple-muted: var(--muted, var(--card));
  --apple-muted-foreground: var(--muted-foreground, var(--foreground));
  --apple-accent: var(--accent, var(--secondary, var(--muted, var(--card))));
  --apple-accent-foreground: var(--accent-foreground, var(--foreground));
  --apple-destructive: var(--destructive, #ef4444);
  --apple-destructive-foreground: var(--destructive-foreground, #ffffff);
  --apple-border: var(--border, currentColor);
  --apple-input: var(--input, var(--border));
  --apple-ring: var(--ring, var(--primary));
  --apple-chart-1: var(--chart-1, var(--primary));
  --apple-chart-2: var(--chart-2, var(--secondary, var(--primary)));
  --apple-chart-3: var(--chart-3, var(--accent, var(--primary)));
  --apple-chart-4: var(--chart-4, var(--muted-foreground, var(--foreground)));
  --apple-chart-5: var(--chart-5, var(--foreground));
  --apple-sidebar: var(--sidebar, var(--background));
  --apple-sidebar-foreground: var(--sidebar-foreground, var(--foreground));
  --apple-sidebar-primary: var(--sidebar-primary, var(--primary));
  --apple-sidebar-primary-foreground: var(--sidebar-primary-foreground, var(--primary-foreground));
  --apple-sidebar-accent: var(--sidebar-accent, var(--accent, var(--muted, var(--card))));
  --apple-sidebar-accent-foreground: var(--sidebar-accent-foreground, var(--accent-foreground, var(--foreground)));

/* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

    --color-sidebar-primary-foreground: var(--apple-sidebar-primary-foreground);
    --color-sidebar-accent: var(--apple-sidebar-accent);
    --color-sidebar-accent-foreground: var(--apple-sidebar-accent-foreground);
  }
  @layer base {
    body { background: var(--apple-background); color: var(--apple-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="mx-auto w-full max-w-[390px] min-h-[844px] relative overflow-hidden flex flex-col">

        <!-- Status Bar -->
        <header class="flex items-center justify-between px-8 pt-4 pb-1 flex-shrink-0" style="height: 44px;">
            <span class="text-sm font-semibold" style="color: var(--text);">9:41</span>
            <div class="flex items-center gap-1.5">
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <rect x="0" y="3" width="3" height="9" rx="1" fill="var(--text)"/>
                    <rect x="4.5" y="2" width="3" height="10" rx="1" fill="var(--text)"/>
                    <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="var(--text)"/>
                    <rect x="13" y="0" width="3" height="12" rx="1" fill="var(--text)" opacity="0.3"/>
                </svg>
                <svg width="15" height="10" viewBox="0 0 15 10" fill="none">
                    <path d="M1 3.5C3.5 1.5 6 0.5 7.5 0.5C9 0.5 11.5 1.5 14 3.5" stroke="var(--text)" stroke-width="1.2" stroke-linecap="round"/>
                    <path d="M3 6C4.8 4.5 6.3 3.8 7.5 3.8C8.7 3.8 10.2 4.5 12 6" stroke="var(--text)" stroke-width="1.2" stroke-linecap="round"/>
                    <circle cx="7.5" cy="9" r="1.2" fill="var(--text)"/>
                </svg>
                <div class="flex items-center">
                    <div class="relative w-6 h-3 rounded-sm border" style="border-color: var(--text);">
                        <div class="absolute inset-[1px] rounded-[1px]" style="background: var(--text); width: 75%;"></div>
                    </div>
                    <div class="w-0.5 h-1.5 rounded-r-sm ml-[1px]" style="background: var(--text);"></div>
                </div>
            </div>
        </header>

        <!-- Header -->
        <div class="flex items-center justify-center px-6 py-3 flex-shrink-0">
            <h1 class="text-[17px] font-semibold" style="color: var(--text);">与 AI 对话</h1>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 overflow-y-auto px-4 pb-2 no-scrollbar" style="background: var(--bg);">

            <!-- AI Message 1 -->
            <div class="flex items-end gap-2 mb-4">
                <span class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center" style="background: var(--accent);">
                    <span data-icon style="width:16px;height:16px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');background-color:#ffffff;"></span>
                </span>
                <div class="max-w-[75%] px-4 py-3 rounded-[16px] rounded-tl-[4px]" style="background: var(--ai-bubble);">
                    <p class="text-[15px] leading-relaxed" style="color: var(--text);">早上好文东 &#x2600; 今天有什么想记录的吗？或者我们聊聊最近的生活？</p>
                </div>
            </div>

            <!-- User Message 1 -->
            <div class="flex items-end justify-end gap-2 mb-4">
                <div class="max-w-[75%] px-4 py-3 rounded-[16px] rounded-tr-[4px]" style="background: var(--user-bubble);">
                    <p class="text-[15px] leading-relaxed" style="color: var(--text);">孩子今天生日，想记录一下</p>
                </div>
            </div>

            <!-- AI Message 2 -->
            <div class="flex items-end gap-2 mb-4">
                <span class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center" style="background: var(--accent);">
                    <span data-icon style="width:16px;height:16px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');background-color:#ffffff;"></span>
                </span>
                <div class="max-w-[75%] px-4 py-3 rounded-[16px] rounded-tl-[4px]" style="background: var(--ai-bubble);">
                    <p class="text-[15px] leading-relaxed" style="color: var(--text);">太好了！&#x1F382; 这是孩子的第几个生日？有什么特别的安排吗？</p>
                </div>
            </div>

            <!-- User Message 2 -->
            <div class="flex items-end justify-end gap-2 mb-4">
                <div class="max-w-[75%] px-4 py-3 rounded-[16px] rounded-tr-[4px]" style="background: var(--user-bubble);">
                    <p class="text-[15px] leading-relaxed" style="color: var(--text);">第三个生日，晚上准备了一个小蛋糕</p>
                </div>
            </div>

            <!-- AI Message 3 -->
            <div class="flex items-end gap-2 mb-4">
                <span class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center" style="background: var(--accent);">
                    <span data-icon style="width:16px;height:16px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');background-color:#ffffff;"></span>
                </span>
                <div class="max-w-[75%] px-4 py-3 rounded-[16px] rounded-tl-[4px]" style="background: var(--ai-bubble);">
                    <p class="text-[15px] leading-relaxed" style="color: var(--text);">已为你记录 &#x2705; 孩子的第三个生日，晚上有小蛋糕。需要我设置一个每年提醒吗？</p>
                </div>
            </div>

            <!-- AI Quick Suggestion Card -->
            <div class="flex justify-center mb-4">
                <div class="max-w-[85%] px-5 py-4 rounded-[16px]" style="background: var(--card); border: 1.5px solid var(--accent); box-shadow: 0 2px 8px rgba(50, 213, 160, 0.10);">
                    <p class="text-[14px] leading-relaxed text-center" style="color: var(--muted);">&#x1F4A1; 你也可以直接告诉我今天的心情、工作收获、或任何想法</p>
                </div>
            </div>

            <!-- Bottom spacer so last message isn't hidden -->
            <div class="h-2"></div>
        </div>

        <!-- Input Bar -->
        <div class="flex-shrink-0 px-4 pb-2 pt-2" style="background: var(--bg);">
            <div class="flex items-center gap-2.5">
                <!-- Attachment Icons -->
                <div class="flex items-center gap-1.5">
                    <button class="w-8 h-8 rounded-full flex items-center justify-center" style="background: var(--card); border: 1px solid var(--border);">
                        <span data-icon style="width:16px;height:16px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/circle-plus.svg');mask-image:url('../assets/icons/dl_builtin_apple/circle-plus.svg');background-color:var(--muted);"></span>
                    </button>
                    <button class="w-8 h-8 rounded-full flex items-center justify-center" style="background: var(--card); border: 1px solid var(--border);">
                        <span data-icon style="width:16px;height:16px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/circle-play.svg');mask-image:url('../assets/icons/dl_builtin_apple/circle-play.svg');background-color:var(--muted);"></span>
                    </button>
                    <button class="w-8 h-8 rounded-full flex items-center justify-center" style="background: var(--card); border: 1px solid var(--border);">
                        <span data-icon style="width:16px;height:16px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/map-pin.svg');mask-image:url('../assets/icons/dl_builtin_apple/map-pin.svg');background-color:var(--muted);"></span>
                    </button>
                </div>
                <!-- Text Input -->
                <div class="flex-1 h-9 rounded-full flex items-center px-4" style="background: var(--card); border: 1px solid var(--border);">
                    <input type="text" placeholder="记录想法，或和 AI 聊聊..." class="w-full bg-transparent border-none outline-none text-[14px]" style="color: var(--text);" />
                </div>
                <!-- Send Button -->
                <button class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background: var(--accent);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 3 3 9-3 9 19-9Z"/>
                        <path d="M6 12h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Bottom Tab Bar -->
        <nav class="flex-shrink-0 flex items-end justify-around px-2 pt-2" style="height: 82px; background: rgba(245, 245, 247, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);">
            <!-- Today -->
            <div class="flex flex-col items-center gap-0.5 w-14" data-dom-id="tab-today">
                <span class="flex items-center justify-center w-7 h-7">
                    <span data-icon style="width:22px;height:22px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/house.svg');mask-image:url('../assets/icons/dl_builtin_apple/house.svg');background-color:var(--muted);"></span>
                </span>
                <span class="text-[10px] font-medium" style="color: var(--muted);">今天</span>
            </div>

            <!-- Timeline -->
            <div class="flex flex-col items-center gap-0.5 w-14" data-dom-id="tab-timeline">
                <span class="flex items-center justify-center w-7 h-7">
                    <span data-icon style="width:22px;height:22px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/circle-play.svg');mask-image:url('../assets/icons/dl_builtin_apple/circle-play.svg');background-color:var(--muted);"></span>
                </span>
                <span class="text-[10px] font-medium" style="color: var(--muted);">时间线</span>
            </div>

            <!-- Chat (active, center position) -->
            <div class="flex flex-col items-center gap-0.5 w-14">
                <span class="flex items-center justify-center w-7 h-7">
                    <span data-icon style="width:22px;height:22px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');mask-image:url('../assets/icons/dl_builtin_apple/message-circle-more.svg');background-color:var(--accent);"></span>
                </span>
                <span class="text-[10px] font-semibold" style="color: var(--accent);">对话</span>
            </div>

            <!-- Me -->
            <div class="flex flex-col items-center gap-0.5 w-14" data-dom-id="tab-me">
                <span class="flex items-center justify-center w-7 h-7">
                    <span data-icon style="width:22px;height:22px;-webkit-mask-image:url('../assets/icons/dl_builtin_apple/user.svg');mask-image:url('../assets/icons/dl_builtin_apple/user.svg');background-color:var(--muted);"></span>
                </span>
                <span class="text-[10px] font-medium" style="color: var(--muted);">我的</span>
            </div>
        </nav>

    </main>

    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --accent: #32d5a0;
            --text: #1d1d1f;
            --muted: #86868b;
            --border: rgba(0, 0, 0, 0.06);
            --ai-bubble: #e8faf3;
            --user-bubble: #e8f4fd;
        }

        body {
            background: var(--bg) !important;
            color: var(--text) !important;
        }

        main {
            background: var(--bg);
            font-family: 'DM Sans', ui-sans-serif, sans-serif, system-ui;
        }

        /* Ensure light theme overrides */
        html.light,
        html.light body {
            background: var(--bg) !important;
            color: var(--text) !important;
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
